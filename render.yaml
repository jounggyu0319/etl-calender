# Render Blueprint: https://render.com/docs/blueprint-spec
# 시크릿(APP_SECRET_KEY, CRYPTO_KEY, GOOGLE_*, OAuth JSON 경로 등)은 대시보드 Environment / Secret File로만 설정한다.
# name 은 기본 URL 후보(https://<name>.onrender.com)에 쓰이는 경우가 많음. 최종 퍼블릭 호스트는 대시보드 URL을 따르고,
# GOOGLE_REDIRECT_URI 는 README대로 https://<실제호스트>/api/oauth/google/callback 한 줄로 맞춘다.
services:
  - type: web
    name: etl-calendar-sync
    runtime: python
    # Render 기본 3.14.x 는 SQLAlchemy 등과 호환 이슈가 있을 수 있어 3.11 LTS 로 고정
    # (공식: PYTHON_VERSION 에 완전한 버전 문자열 — https://render.com/docs/python-version )
    # plan 생략 시 기본 starter(유료)라 Blueprint 검증/결제 단계에서 막힐 수 있음
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DEPLOY_ENV
        value: production
