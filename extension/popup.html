<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>eTL → Google Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Pretendard", "Noto Sans KR", sans-serif;
      width: 320px;
      background: #f5f7fb;
      color: #1e293b;
      font-size: 14px;
    }

    /* ── header ── */
    header {
      background: #003876;
      color: white;
      padding: 14px 16px 12px;
    }
    header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    header p  { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* ── status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px;
      color: #475569;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-ok  { background: #22c55e; }
    .dot-err { background: #94a3b8; }
    .dot-warn{ background: #f59e0b; }

    /* ── sections ── */
    section { padding: 14px 16px; background: white; border-bottom: 1px solid #e2e8f0; }

    /* ── login form ── */
    #login-section label { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
    #login-section input {
      width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px;
      font-size: 13px; outline: none; transition: border-color .15s;
      margin-bottom: 10px;
    }
    #login-section input:focus { border-color: #003876; }

    /* ── buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn-primary { background: #003876; color: white; }
    .btn-primary:hover:not(:disabled) { background: #002a5c; }
    .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; }
    .btn-secondary:hover:not(:disabled) { background: #e2e8f0; }
    .btn-sm { padding: 7px 10px; font-size: 12px; font-weight: 500; width: auto; }

    /* ── sync section ── */
    #sync-section {}
    #myetl-status {
      font-size: 12px; margin-bottom: 10px;
      padding: 8px 10px; border-radius: 8px; background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    /* ── progress ── */
    #progress {
      margin-top: 10px; font-size: 12px; color: #475569;
      background: #f8fafc; border-radius: 8px; padding: 8px 10px;
      border: 1px solid #e2e8f0; display: none;
    }
    #progress-bar-wrap {
      height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 6px; overflow: hidden;
    }
    #progress-bar { height: 100%; background: #003876; width: 0%; transition: width .3s; }

    /* ── result ── */
    #result {
      margin-top: 10px; font-size: 12px; line-height: 1.6;
      background: #f8fafc; border-radius: 8px; padding: 8px 10px;
      border: 1px solid #e2e8f0; white-space: pre-wrap; word-break: break-word;
      display: none;
    }
    #result.ok  { border-color: #86efac; background: #f0fdf4; color: #15803d; }
    #result.err { border-color: #fca5a5; background: #fef2f2; color: #dc2626; }

    /* ── settings ── */
    #settings-section summary {
      cursor: pointer; font-size: 12px; color: #64748b; padding: 10px 16px;
      background: white; border-bottom: 1px solid #e2e8f0; list-style: none;
      display: flex; justify-content: space-between;
    }
    #settings-section summary::-webkit-details-marker { display: none; }
    details[open] summary { color: #003876; }
    .settings-body { padding: 12px 16px; background: white; border-bottom: 1px solid #e2e8f0; }
    .settings-body label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 3px; margin-top: 8px; }
    .settings-body label:first-child { margin-top: 0; }
    .settings-body input {
      width: 100%; padding: 6px 8px; border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 12px; outline: none;
    }
    .settings-body input:focus { border-color: #003876; }
    .settings-row { display: flex; gap: 6px; margin-top: 8px; }

    footer {
      padding: 8px 16px;
      font-size: 10px; color: #94a3b8; text-align: center;
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <header>
    <h1>eTL → Google Calendar</h1>
    <p>SNU myetl 과제·퀴즈를 자동으로 동기화</p>
  </header>

  <!-- 연결 상태 표시 -->
  <div id="status-bar">
    <span class="dot dot-err" id="status-dot"></span>
    <span id="status-text">연결 확인 중…</span>
  </div>

  <!-- 로그인 섹션 (서버 계정) -->
  <section id="login-section" style="display:none;">
    <p style="font-size:12px;color:#64748b;margin-bottom:12px;">
      eTL Calendar 계정으로 로그인하면 Google 캘린더와 자동 연동됩니다.
    </p>
    <label for="inp-email">이메일</label>
    <input id="inp-email" type="email" placeholder="name@email.com" autocomplete="username" />
    <label for="inp-pass">비밀번호</label>
    <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
    <button class="btn btn-primary" id="btn-login">로그인</button>
    <p style="font-size:11px;color:#94a3b8;margin-top:8px;text-align:center;">
      계정이 없다면 <a id="link-open-app" href="#" style="color:#003876;">웹앱</a>에서 가입하세요.
    </p>
  </section>

  <!-- 동기화 섹션 (로그인 후) -->
  <section id="sync-section" style="display:none;">
    <div id="myetl-status">myetl 탭 확인 중…</div>
    <button class="btn btn-primary" id="btn-sync" disabled>
      <span>📅</span> 이 탭에서 수집 후 동기화
    </button>
    <button class="btn btn-secondary" id="btn-open-myetl" style="margin-top:8px;display:none;">
      myetl 열기 (이미 로그인된 탭 필요)
    </button>

    <div id="progress">
      <span id="progress-text">준비 중…</span>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
    <div id="result"></div>

    <div style="display:flex;justify-content:flex-end;margin-top:10px;">
      <button class="btn btn-secondary btn-sm" id="btn-logout">로그아웃</button>
    </div>
  </section>

  <!-- 설정 (고급) -->
  <details id="settings-section">
    <summary>고급 설정 <span>▸</span></summary>
    <div class="settings-body">
      <label>서버 주소 (기본: https://etl-calendar-sync.onrender.com)</label>
      <input id="set-api" placeholder="https://etl-calendar-sync.onrender.com" />
      <div class="settings-row">
        <button class="btn btn-secondary btn-sm" id="btn-save-settings" style="flex:1;">저장</button>
        <button class="btn btn-secondary btn-sm" id="btn-reset-settings" style="flex:1;">초기화</button>
      </div>
    </div>
  </details>

  <footer>myetl 탭이 열려 있어야 동작합니다</footer>

  <script src="popup.js"></script>
</body>
</html>
